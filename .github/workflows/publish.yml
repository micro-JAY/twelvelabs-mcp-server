name: Publish to npm

on:
  release:
    types: [published]
  workflow_dispatch:

permissions:
  contents: read
  id-token: write

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          registry-url: https://registry.npmjs.org
          cache: npm

      - run: npm ci

      - run: npm run build

      # Authenticates via npm trusted publishing (OIDC). No NPM_TOKEN secret
      # required — npm verifies the GitHub Actions identity claim issued by the
      # `id-token: write` permission above. Configure the trusted publisher
      # under the package's settings on npmjs.com before running this workflow.
      - name: Publish with provenance (OIDC)
        run: npm publish --provenance --access public
